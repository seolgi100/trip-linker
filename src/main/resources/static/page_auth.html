<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TripLinker - 회원가입</title>

  <link rel="stylesheet" href="/styles_main.css">

</head>
<body>
<div class="page active" id="page-signup">
  <div class="auth-wrap" style="align-items:flex-start;padding-top:28px">
    <div class="auth-card" style="width:600px">
      <h2 class="auth-ttl">회원가입</h2>
      <p class="auth-sub">TripLinker와 함께 완성형 여행을 시작하세요</p>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">아이디</label>
          <div style="display:flex; gap:8px;">
            <input class="form-input" type="text" id="username" placeholder="영문·한글 20자 이내" style="flex:1;">
            <button class="btn-f" style="width:auto; padding:0 12px; font-size:12px;" onclick="checkDuplicateId()">중복 확인</button>
          </div>
          <div class="form-msg" id="uname-msg"></div>
        </div>
        <div class="form-group">
          <label class="form-label">이름</label>
          <input class="form-input" type="text" id="name" placeholder="실명">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">이메일</label>
        <div style="display:flex; gap:8px;">
          <input class="form-input" type="email" id="email" placeholder="email@example.com" style="flex:1;">
          <button class="btn-f" style="width:auto; padding:0 12px; font-size:12px;" onclick="sendAuthCode()">인증 받기</button>
        </div>
        <div class="form-msg" id="email-msg"></div>
      </div>

      <div class="form-group" id="verify-area">
        <div style="display:flex; gap:8px;">
          <input class="form-input" type="text" id="authCode" placeholder="메일로 받은 6자리 숫자" style="flex:1;">
          <button class="btn-f" style="width:auto; padding:0 12px; font-size:12px; background:gray;" onclick="verifyAuthCode()">인증 확인</button>
        </div>
      </div>
      <div class="form-group"><label class="form-label">비밀번호</label>
        <input class="form-input" type="password" id="password"
               placeholder="영문+숫자+특수문자" oninput="checkPw(this)">
        <div class="pw-bar-wrap">
          <div class="pw-bar" id="pw-bar"></div>
        </div>
        <div class="form-msg" id="pw-msg"></div>
      </div>
      <div class="form-group"><label class="form-label">비밀번호 확인</label>
        <input class="form-input" type="password" id="passwordConfirm"
               placeholder="재입력" oninput="checkPw2(this)">
        <div class="form-msg" id="pw2-msg"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">생년월일</label>
          <input class="form-input" type="date" id="birthDate"></div>
        <div class="form-group"><label class="form-label">거주 지역</label>
          <div class="loc-selector"><select class="loc-big" onchange="updateCity(this)">
            <option value="">도/시 선택</option>
            <option>서울</option>
            <option>경기</option>
            <option>인천</option>
            <option>강원</option>
            <option>충북</option>
            <option>충남</option>
            <option>대전</option>
            <option>세종</option>
            <option>전북</option>
            <option>전남</option>
            <option>광주</option>
            <option>경북</option>
            <option>경남</option>
            <option>대구</option>
            <option>울산</option>
            <option>부산</option>
            <option>제주</option>
          </select><select class="loc-big" id="city-select">
            <option value="">시/군/구 선택</option>
          </select></div>
        </div>
      </div>
      <div class="form-group"><label class="form-label">성별</label>
        <div class="chip-row">
          <button class="chip" onclick="pick(this,'gender')" data-val="M">남성</button>
          <button class="chip" onclick="pick(this,'gender')" data-val="F">여성</button>
        </div>
      </div>
      <div class="form-group"><label class="form-label">MBTI <small style="color:var(--text3);font-weight:400">(J/P →
        일정 밀도 자동 설정)</small></label>
        <div style="display:flex;flex-direction:column;gap:8px" id="mbti-selector">
          <div style="display:flex;gap:6px;align-items:center">
            <span style="font-size:11px;color:var(--text3);width:52px;font-weight:600">에너지</span>
            <button class="chip chip-sm on" onclick="selectMbti(this,'ei','E')" data-pos="0" data-val="E">E
              (외향)</button>
            <button class="chip chip-sm" onclick="selectMbti(this,'ei','I')" data-pos="0" data-val="I">I (내향)</button>
          </div>
          <div style="display:flex;gap:6px;align-items:center">
            <span style="font-size:11px;color:var(--text3);width:52px;font-weight:600">인식</span>
            <button class="chip chip-sm on" onclick="selectMbti(this,'sn','S')" data-pos="1" data-val="S">S
              (감각)</button>
            <button class="chip chip-sm" onclick="selectMbti(this,'sn','N')" data-pos="1" data-val="N">N (직관)</button>
          </div>
          <div style="display:flex;gap:6px;align-items:center">
            <span style="font-size:11px;color:var(--text3);width:52px;font-weight:600">판단</span>
            <button class="chip chip-sm on" onclick="selectMbti(this,'tf','T')" data-pos="2" data-val="T">T
              (사고)</button>
            <button class="chip chip-sm" onclick="selectMbti(this,'tf','F')" data-pos="2" data-val="F">F (감정)</button>
          </div>
          <div style="display:flex;gap:6px;align-items:center">
            <span style="font-size:11px;color:var(--text3);width:52px;font-weight:600">생활</span>
            <button class="chip chip-sm" onclick="selectMbti(this,'jp','J')" data-pos="3" data-val="J">J (계획)</button>
            <button class="chip chip-sm on" onclick="selectMbti(this,'jp','P')" data-pos="3" data-val="P">P
              (즉흥)</button>
          </div>
        </div>
        <div
                style="margin-top:9px;background:var(--sage-pale);border-radius:8px;padding:8px 12px;font-size:12px;color:var(--sage-d);display:flex;align-items:center;gap:8px">
          <span style="font-weight:700">선택된 MBTI:</span>
          <span id="mbti-result" style="font-size:15px;font-weight:800">ESTP</span>
          <span id="mbti-density" style="font-size:11px;color:var(--text3)">→ P: 여유롭게 자동 설정</span>
        </div>
      </div>
      <button class="btn-f" style="width:100%;padding:12px;font-size:14px;border-radius:var(--r);margin-top:4px"
              onclick="doSignup()">회원가입</button>
      <div class="social-sep">
        <div class="social-line"></div><span class="social-txt">소셜 계정으로 가입</span>
        <div class="social-line"></div>
      </div>
      <div style="display:flex;gap:9px"><button class="btn-social" onclick="toast('구글 OAuth 2.0')">🔵 구글로
        가입</button><button class="btn-social" onclick="startKakaoSignup()">🟡 카카오로 가입</button></div>
      <div style="text-align:center;margin-top:14px;font-size:12px;color:var(--text3)">계정 있으신가요? <button
              class="auth-link" onclick="go('login')">로그인</button></div>
    </div>
  </div>
</div>


<div class="page" id="page-signup-kakao">
  <div class="auth-wrap" style="align-items:flex-start;padding-top:28px">
    <div class="auth-card" style="width:600px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
        <div style="width:34px;height:34px;border-radius:50%;background:#FEE500;display:flex;align-items:center;justify-content:center;font-size:18px">🟡</div>
        <div>
          <h2 class="auth-ttl" style="margin-bottom:0">카카오 계정으로 가입</h2>
          <p style="font-size:12px;color:var(--sage-d);margin:0">카카오 계정이 연결되었습니다</p>
        </div>
      </div>
      <div style="background:#FFF9E6;border:1px solid #FEE500;border-radius:9px;padding:10px 14px;font-size:12px;color:#6B5A00;margin-bottom:18px">
        🟡 카카오로 연결되었습니다. 아이디·이메일·비밀번호는 카카오 계정으로 대체됩니다.
      </div>
      <button class="btn-f" style="width:100%;padding:12px;font-size:14px;border-radius:var(--r);margin-top:4px;background:#FEE500;color:#3C1E1E" onclick="doKakaoSignup()">🟡 카카오로 가입 완료</button>
      <div style="text-align:center;margin-top:12px;font-size:12px;color:var(--text3)"><button class="auth-link" onclick="go('signup')">← 일반 가입으로 돌아가기</button></div>
    </div>
  </div>
</div>

<div class="page" id="page-login">
  <div class="auth-wrap">
    <div class="auth-card" style="width:400px">
      <h2 class="auth-ttl">로그인</h2>
      <p class="auth-sub">TripLinker에 오신 것을 환영합니다</p>
      <div class="login-warn" id="login-warn" style="display:none"></div>
      <div class="form-group"><label class="form-label">아이디</label><input class="form-input" type="text"
                                                                          placeholder="아이디" id="lid"></div>
      <div class="form-group"><label class="form-label">비밀번호</label><input class="form-input" type="password"
                                                                           placeholder="비밀번호" id="lpw" onkeydown="if(event.key==='Enter')tryLogin()"></div>
      <button class="btn-f" style="width:100%;padding:12px;font-size:14px;border-radius:var(--r);margin-bottom:9px"
              onclick="tryLogin()">로그인</button>
      <div style="text-align:center;margin-bottom:12px"><button class="auth-link" style="font-size:12px"
                                                                onclick="openPwReset()">비밀번호 찾기</button></div>
      <div class="social-sep">
        <div class="social-line"></div><span class="social-txt">소셜 로그인</span>
        <div class="social-line"></div>
      </div>
      <div style="display:flex;gap:9px"><button class="btn-social" onclick="toast('구글 로그인')">🔵 구글</button><button
              class="btn-social" onclick="tryKakaoLogin()">🟡 카카오</button></div>
      <div style="text-align:center;margin-top:14px;font-size:12px;color:var(--text3)">계정 없으신가요? <button
              class="auth-link" onclick="go('signup')">회원가입</button></div>
    </div>
  </div>
</div>
</body>

<script>
  // 🔐 이메일 인증 통과 여부를 기억하는 자물쇠 변수
  let isEmailVerified = false;

  // ==========================
  // 1. UI 조작 및 데이터 함수 (성별, MBTI, 지역)
  // ==========================

  function pick(btn, group) {
    const row = btn.parentElement;
    row.querySelectorAll('.chip').forEach(c => c.classList.remove('on'));
    btn.classList.add('on');
  }

  function selectMbti(btn, type, val) {
    const row = btn.parentElement;
    row.querySelectorAll('.chip').forEach(c => c.classList.remove('on'));
    btn.classList.add('on');

    const activeChips = document.querySelectorAll('#mbti-selector .chip.on');
    if(activeChips.length === 4) {
      let result = "";
      activeChips.forEach(chip => { result += chip.getAttribute('data-val'); });
      document.getElementById('mbti-result').innerText = result;
    }
  }

  function updateCity(provinceSelect) {
    const citySelect = document.getElementById("city-select");
    const province = provinceSelect.value;

    const cityData = {
      "서울": ["강남구", "강동구", "강북구", "강서구", "관악구", "광진구", "구로구", "금천구", "노원구", "도봉구", "동대문구", "동작구", "마포구", "서대문구", "서초구", "성동구", "성북구", "송파구", "양천구", "영등포구", "용산구", "은평구", "종로구", "중구", "중랑구"],
      "경기": ["수원시", "성남시", "고양시", "용인시", "부천시", "안산시", "안양시", "남양주시", "화성시", "평택시", "의정부시", "시흥시", "파주시", "광명시", "김포시", "군포시", "광주시", "이천시", "양주시", "오산시", "구리시", "안성시", "포천시", "의왕시", "하남시", "여주시", "양평군", "동두천시", "과천시", "가평군", "연천군"],
      "인천": ["계양구", "미추홀구", "남동구", "동구", "부평구", "서구", "연수구", "중구", "강화군", "옹진군"],
      "부산": ["강서구", "금정구", "기장군", "남구", "동구", "동래구", "부산진구", "북구", "사상구", "사하구", "서구", "수영구", "연제구", "영도구", "중구", "해운대구"],
      "제주": ["제주시", "서귀포시"]
    };

    citySelect.innerHTML = '<option value="">시/군/구 선택</option>';

    if (cityData[province]) {
      cityData[province].forEach(city => {
        const option = document.createElement("option");
        option.value = city;
        option.innerText = city;
        citySelect.appendChild(option);
      });
    }
  }

  // ==========================
  // 2. 백엔드 통신 함수 (가입, 인증, 중복확인)
  // ==========================

  function checkDuplicateId() {
    const username = document.getElementById("username").value;
    if(!username) { alert("아이디를 먼저 입력해주세요."); return; }

    fetch(`/api/auth/check-username?username=${username}`)
            .then(res => res.text())
            .then(isDuplicate => {
              if(isDuplicate === "true") alert("❌ 이미 사용 중인 아이디입니다.");
              else alert("✅ 사용 가능한 아이디입니다!");
            });
  }

  function sendAuthCode() {
    const email = document.getElementById("email").value;
    if(!email) { alert("이메일을 입력해주세요."); return; }

    fetch(`/api/auth/check-email?email=${email}`)
            .then(res => res.text())
            .then(isDuplicate => {
              if(isDuplicate === "true") {
                alert("❌ 이미 가입된 이메일입니다. 다른 이메일을 사용해주세요.");
              } else {
                alert("메일을 발송 중입니다. 잠시만 기다려주세요...");
                fetch(`/api/auth/send-email?email=${email}`, { method: "POST" })
                        .then(response => response.text())
                        .then(msg => alert("✅ 인증 메일이 발송되었습니다! 메일함을 확인해주세요."));
              }
            });
  }

  function verifyAuthCode() {
    const email = document.getElementById("email").value;
    const code = document.getElementById("authCode").value;

    fetch(`/api/auth/verify-email?email=${email}&code=${code}`, { method: "POST" })
            .then(response => {
              if(response.ok) {
                alert("✅ 이메일 인증이 완료되었습니다!");
                isEmailVerified = true;
                document.getElementById("email").readOnly = true;
              } else {
                alert("❌ 인증번호가 틀렸거나 만료되었습니다.");
                isEmailVerified = false;
              }
            });
  }

  function doSignup() {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value;
    const passwordConfirm = document.getElementById("passwordConfirm").value;
    const email = document.getElementById("email").value.trim();
    const name = document.getElementById("name").value.trim();
    const birthDate = document.getElementById("birthDate").value;
    const province = document.querySelectorAll(".loc-big")[0].value;
    const city = document.getElementById("city-select").value;

    // 👇 성별 에러 해결: HTML 버튼의 data-val 값(M, F)을 읽어옵니다.
    const genderBtn = document.querySelector('button[onclick*="gender"].on');
    const selectedGender = genderBtn ? genderBtn.getAttribute('data-val') : "";

    const selectedMbti = document.getElementById("mbti-result").innerText;

    // 🚧 빈칸 및 필수 체크
    if (!username) { alert("아이디를 입력해주세요."); return; }
    if (!name) { alert("이름을 입력해주세요."); return; }
    if (!email) { alert("이메일을 입력해주세요."); return; }
    if (!isEmailVerified) { alert("⚠️ 이메일 인증을 먼저 완료해주세요!"); return; }
    if (!password) { alert("비밀번호를 입력해주세요."); return; }

    const pwPattern = /^(?=.*[0-9])(?=.*[a-zA-Z])(?=.*\W)(?=\S+$).{8,16}$/;
    if (!pwPattern.test(password)) {
      alert("비밀번호는 8~16자 영문 대 소문자, 숫자, 특수문자를 포함해야 합니다.");
      return;
    }

    if (password !== passwordConfirm) { alert("비밀번호 재입력이 일치하지 않습니다."); return; }
    if (!birthDate) { alert("생년월일을 선택해주세요."); return; }
    if (!province || province === "도/시 선택") { alert("거주 지역(도/시)을 선택해주세요."); return; }
    if (!selectedGender) { alert("성별을 선택해주세요."); return; }
    if (selectedMbti.length !== 4) { alert("MBTI 4가지 항목을 모두 선택해주세요."); return; }

    const finalRegion = province + (city && city !== "시/군/구 선택" ? " " + city : "");

    const requestData = {
      username: username,
      password: password,
      email: email,
      name: name,
      region: finalRegion,
      birthDate: birthDate,
      gender: selectedGender,
      mbti: selectedMbti
    };

    fetch("/api/auth/signup", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(requestData)
    })
            .then(async response => {
              if(response.ok) {
                alert("🎉 TripLinker 회원가입 성공!");
              } else {
                const errData = await response.json().catch(() => null);
                if (errData && errData.errors && errData.errors.length > 0) {
                  alert("가입 실패: " + errData.errors[0].defaultMessage);
                } else {
                  alert("가입 실패: 입력 조건을 다시 확인해주세요.");
                }
              }
            });

  }



  // 변수 추가 (인증에 성공한 이메일과 코드를 임시 기억)
  let resetEmail = "";
  let resetCode = "";

  // [단계 1] 이메일 입력 후 인증메일 발송 버튼 클릭 시
  function sendPwEmail() {
    const email = document.getElementById('pr-email').value.trim();
    if (!email) { alert('이메일을 입력해주세요.'); return; }

    fetch('/api/auth/password/reset-request', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: email })
    })
            .then(async res => {
              const msg = await res.text();
              if (res.ok) {
                alert('✅ ' + msg);
                resetEmail = email; // 이메일 저장

                // 3분 타이머 및 화면 전환 (재민 님이 기존에 짜두신 UI 로직 그대로 활용)
                document.getElementById('pr-step1').style.display = 'none';
                document.getElementById('pr-step2').style.display = 'block';
                startPwTimer(); // 기존 타이머 함수 호출
              } else {
                alert('❌ ' + msg);
              }
            });
  }

  // [단계 2] 인증코드 6자리 입력 후 '확인' 버튼 클릭 시 (수정된 깐깐한 버전)
  function verifyCode() {
    const email = document.getElementById('pr-email').value.trim();
    const code = document.getElementById('pr-code').value.trim();

    if (!code) { alert('인증코드를 입력해주세요.'); return; }

    // ⭐️ 회원가입 때 쓰던 인증 검사 API를 그대로 재활용해서 서버에 먼저 물어봅니다!
    fetch(`/api/auth/verify-email?email=${email}&code=${code}`, { method: "POST" })
            .then(response => {
              if(response.ok) {
                // ⭕️ 인증 성공! 이제 당당하게 Step 3(비번 변경) 창을 띄워줍니다.
                alert("✅ 인증이 완료되었습니다. 새 비밀번호를 입력해주세요.");
                resetCode = code; // 나중을 위해 코드 기억해두기

                document.getElementById('pr-step2').style.display = 'none';
                document.getElementById('pr-step3').style.display = 'block';
                if(window._pwTimer) clearInterval(window._pwTimer); // 타이머 멈추기
              } else {
                // ❌ 인증 실패! 다음 창으로 안 넘겨주고 여기서 막습니다.
                alert("❌ 인증번호가 틀렸거나 만료되었습니다. 다시 확인해주세요.");
              }
            });
  }

  // [단계 3] 새 비밀번호 입력 후 최종 변경 버튼 클릭 시
  function setPwNew() {
    const np = document.getElementById('pr-new-pw').value;
    const cp = document.getElementById('pr-confirm-pw').value;

    if (!np) { alert('새 비밀번호를 입력해주세요.'); return; }
    if (np !== cp) { alert('비밀번호가 일치하지 않습니다.'); return; }

    const pwPattern = /^(?=.*[0-9])(?=.*[a-zA-Z])(?=.*\W)(?=\S+$).{8,16}$/;
    if (!pwPattern.test(np)) {
      alert("비밀번호는 8~16자 영문, 숫자, 특수문자를 조합해야 합니다.");
      return;
    }

    // 백엔드로 최종 변경 요청 날리기!
    fetch('/api/auth/password/reset', {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: resetEmail,
        code: resetCode,
        newPassword: np
      })
    })
            .then(async res => {
              const msg = await res.text();
              if (res.ok) {
                alert('🎉 ' + msg);
                closePwReset(); // 모달 닫기
                go('login');    // 로그인 화면으로 보내기
              } else {
                alert('❌ 변경 실패: ' + msg);
              }
            });
  }
</script>
</html>
