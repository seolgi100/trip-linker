            <div id="info-pw-err" style="display:none;color:var(--coral);font-size:12px;margin-bottom:10px">⚠️ 비밀번호가 올바르지 않습니다.</div>
            <button class="btn-f" style="padding:10px 20px;border-radius:var(--r)" onclick="verifyInfoPw()">확인</button>
          </div>
        </div>
        <div id="info-edit-form" style="display:none">
          <div id="info-edit-fields"></div>
          <div style="display:flex;gap:8px;margin-top:8px">
            <button class="btn-f" style="padding:10px 20px;border-radius:var(--r)" onclick="saveInfoEdit()">저장</button>
            <button class="btn-prev-step" style="padding:10px 14px;border-radius:var(--r)" onclick="resetInfoStep()">취소</button>
          </div>
        </div>
      </div>

      <div id="my-withdraw" style="display:none">
        <h3 class="my-sec-ttl">회원 탈퇴</h3>
        <div id="withdraw-warn-txt" style="background:#FEF3F2;border:1px solid #FECACA;border-radius:9px;padding:14px;margin-bottom:14px;font-size:12px;color:#7F1D1D;line-height:1.8"></div>
        <div id="withdraw-social-box" style="display:none" class="form-group">
          <label class="form-label">이메일 재확인</label>
          <input class="form-input" type="email" id="withdrawEmailInput" placeholder="가입한 이메일 주소 입력">
        </div>
        <div id="withdraw-pw-box" class="form-group">
          <label class="form-label">비밀번호 재확인</label>
          <input class="form-input" type="password" placeholder="비밀번호 입력">
        </div>
        <button style="width:100%;padding:11px;border-radius:var(--r);background:var(--coral);color:#fff;border:none;cursor:pointer;font-size:13px;font-weight:700"
                onclick="if(confirm('정말 탈퇴하시겠습니까?'))toast('탈퇴 완료')">회원 탈퇴</button>
      </div>
    </div>
  </div>
</div>
</div>
