<div th:fragment="auth" xmlns:th="http://www.thymeleaf.org">
<script>
  /* ============================================================
   * [page_auth.html] 하드코딩 데이터 → 변수 분리
   * ============================================================ */

  // ── API 엔드포인트 ──
  const AUTH_API = {
    checkUsername: '/api/auth/check-username',
    checkEmail:    '/api/auth/check-email',
    sendEmail:     '/api/auth/send-email',
    verifyEmail:   '/api/auth/verify-email',
    signup:        '/api/auth/signup',
  };

  // ── 페이지 텍스트 ──
  const AUTH_TEXT = {
    signupTitle:   '회원가입',
    signupSub:     'TripLinker와 함께 완성형 여행을 시작하세요',
    loginTitle:    '로그인',
    loginSub:      'TripLinker에 오신 것을 환영합니다',
    kakaoTitle:    '카카오 계정으로 가입',
    kakaoSub:      '카카오 계정이 연결되었습니다',
    kakaoNotice:   '🟡 카카오로 연결되었습니다. 아이디·이메일·비밀번호는 카카오 계정으로 대체됩니다.',
  };

  // ── 거주 지역 도/시 목록 ──
  const REGION_PROVINCES = [
    '서울','경기','인천','강원','충북','충남','대전','세종',
    '전북','전남','광주','경북','경남','대구','울산','부산','제주',
  ];

  // ── 성별 옵션 ──
  const GENDER_OPTIONS = [
    { val: 'M', label: '남성' },
    { val: 'F', label: '여성' },
  ];

  // ── MBTI 차원 정의 ──
  const MBTI_DIMS = [
    { key: 'ei', label: '에너지', pairs: [{ val:'E', label:'E (외향)' }, { val:'I', label:'I (내향)' }], default: 'E' },
    { key: 'sn', label: '인식',   pairs: [{ val:'S', label:'S (감각)' }, { val:'N', label:'N (직관)' }], default: 'S' },
    { key: 'tf', label: '판단',   pairs: [{ val:'T', label:'T (사고)' }, { val:'F', label:'F (감정)' }], default: 'T' },
    { key: 'jp', label: '생활',   pairs: [{ val:'J', label:'J (계획)' }, { val:'P', label:'P (즉흥)' }], default: 'P' },
  ];

  // ── 비밀번호 정규식 ──
  const PW_PATTERN = /^(?=.*[0-9])(?=.*[a-zA-Z])(?=.*\W)(?=\S+$).{8,16}$/;
  const PW_PATTERN_MSG = '비밀번호는 8~16자 영문 대 소문자, 숫자, 특수문자를 포함해야 합니다.';

  // ── 유효성 검사 메시지 ──
  const AUTH_VALID_MSG = {
    idEmpty:       '아이디를 먼저 입력해주세요.',
    idDuplicate:   '❌ 이미 사용 중인 아이디입니다.',
    idOk:          '✅ 사용 가능한 아이디입니다!',
    emailEmpty:    '이메일을 입력해주세요.',
    emailDuplicate:'❌ 이미 가입된 이메일입니다. 다른 이메일을 사용해주세요.',
    emailSending:  '메일을 발송 중입니다. 잠시만 기다려주세요...',
    emailSent:     '✅ 인증 메일이 발송되었습니다! 메일함을 확인해주세요.',
    verifyOk:      '✅ 이메일 인증이 완료되었습니다!',
    verifyFail:    '❌ 인증번호가 틀렸거나 만료되었습니다.',
    nameEmpty:     '이름을 입력해주세요.',
    emailEmptyForm:'이메일을 입력해주세요.',
    emailNotVerify:'⚠️ 이메일 인증을 먼저 완료해주세요!',
    pwEmpty:       '비밀번호를 입력해주세요.',
    birthEmpty:    '생년월일을 선택해주세요.',
    regionEmpty:   '거주 지역(도/시)을 선택해주세요.',
    genderEmpty:   '성별을 선택해주세요.',
    mbtiIncomplete:'MBTI 4가지 항목을 모두 선택해주세요.',
    signupSuccess: '🎉 TripLinker 회원가입 성공!',
    signupFail:    '가입 실패: 입력 조건을 다시 확인해주세요.',
  };

  // ── 지역별 시/군/구 목록 ──
  const CITY_DATA = {
    '서울': ['강남구','강동구','강북구','강서구','관악구','광진구','구로구','금천구','노원구','도봉구','동대문구','동작구','마포구','서대문구','서초구','성동구','성북구','송파구','양천구','영등포구','용산구','은평구','종로구','중구','중랑구'],
    '경기': ['수원시','성남시','고양시','용인시','부천시','안산시','안양시','남양주시','화성시','평택시','의정부시','시흥시','파주시','광명시','김포시','군포시','광주시','이천시','양주시','오산시','구리시','안성시','포천시','의왕시','하남시','여주시','양평군','동두천시','과천시','가평군','연천군'],
    '인천': ['계양구','미추홀구','남동구','동구','부평구','서구','연수구','중구','강화군','옹진군'],
    '부산': ['강서구','금정구','기장군','남구','동구','동래구','부산진구','북구','사상구','사하구','서구','수영구','연제구','영도구','중구','해운대구'],
    '제주': ['제주시','서귀포시'],
  };

  // page_auth.html 상단 스크립트 내 기존 함수를 아래와 같이 변경
  function initAuthPage() {
    // 변경: querySelector -> querySelectorAll 로 카카오 드롭다운까지 한 번에 선택
    const provSelectors = document.querySelectorAll('select.loc-big[onchange*="updateCity"]');

    provSelectors.forEach(provSel => {
      if (provSel) {
        provSel.innerHTML = `<option value="">도/시 선택</option>` +
                REGION_PROVINCES.map(p => `<option>${p}</option>`).join('');
      }
    });

    // 성별 칩 (기존 로직 유지)
    const genderRow = document.querySelector('button[onclick*="gender"]')?.closest('.chip-row');
    if (genderRow) {
      genderRow.innerHTML = GENDER_OPTIONS.map(g =>
              `<button class="chip" onclick="pick(this,'gender')" data-val="${g.val}">${g.label}</button>`
      ).join('');
    }

    // MBTI 선택기 (기존 로직 유지)
    const mbtiSel = document.getElementById('mbti-selector');
    if (mbtiSel) {
      mbtiSel.innerHTML = MBTI_DIMS.map(d => `
      <div style="display:flex;gap:6px;align-items:center">
        <span style="font-size:11px;color:var(--text3);width:52px;font-weight:600">${d.label}</span>
        ${d.pairs.map(p => `
          <button class="chip chip-sm${p.val === d.default ? ' on' : ''}"
            onclick="selectMbti(this,'${d.key}','${p.val}')"
            data-pos="${MBTI_DIMS.findIndex(x => x.key === d.key)}"
            data-val="${p.val}">${p.label}</button>
        `).join('')}
      </div>
    `).join('');
    }
  }
  // // MBTI 선택기 삭제예정
  // const mbtiSel = document.getElementById('mbti-selector');
  // if (mbtiSel) {
  //   mbtiSel.innerHTML = MBTI_DIMS.map(d => `
  //     <div style="display:flex;gap:6px;align-items:center">
  //       <span style="font-size:11px;color:var(--text3);width:52px;font-weight:600">${d.label}</span>
  //       ${d.pairs.map(p => `
  //         <button class="chip chip-sm${p.val === d.default ? ' on' : ''}"
  //           onclick="selectMbti(this,'${d.key}','${p.val}')"
  //           data-pos="${MBTI_DIMS.findIndex(x => x.key === d.key)}"
  //           data-val="${p.val}">${p.label}</button>
  //       `).join('')}
  //     </div>
  //   `).join('');
  // }
  // }

  // ── 지역 select 업데이트 ──
  // page_auth.html 상단 스크립트 내 기존 함수를 아래와 같이 변경
  // 두 번째 인자로 하위 시군구 select의 ID를 받도록 확장 (기본값은 일반 폼의 'city-select')
  function updateCity(provinceSelect, targetId = 'city-select') {
    const citySelect = document.getElementById(targetId);
    if (!citySelect) return;

    const cities = CITY_DATA[provinceSelect.value] || [];
    citySelect.innerHTML = '<option value="">시/군/구 선택</option>' +
            cities.map(c => `<option value="${c}">${c}</option>`).join('');
  }

  // ── 아이디 중복확인 ──
  function checkDuplicateId() {
    const username = document.getElementById('username').value;
    if (!username) { alert(AUTH_VALID_MSG.idEmpty); return; }
    fetch(`${AUTH_API.checkUsername}?username=${username}`)
            .then(res => res.text())
            .then(isDuplicate => {
              alert(isDuplicate === 'true' ? AUTH_VALID_MSG.idDuplicate : AUTH_VALID_MSG.idOk);
            });
  }

  // ── 이메일 인증 발송 ──
  function sendAuthCode() {
    const email = document.getElementById('email').value;
    if (!email) { alert(AUTH_VALID_MSG.emailEmpty); return; }
    fetch(`${AUTH_API.checkEmail}?email=${email}`)
            .then(res => res.text())
            .then(isDuplicate => {
              if (isDuplicate === 'true') {
                alert(AUTH_VALID_MSG.emailDuplicate);
              } else {
                alert(AUTH_VALID_MSG.emailSending);
                fetch(`${AUTH_API.sendEmail}?email=${email}`, { method: 'POST' })
                        .then(() => alert(AUTH_VALID_MSG.emailSent));
              }
            });
  }

  // ── 이메일 인증 확인 ──
  let isEmailVerified = false;
  function verifyAuthCode() {
    const email = document.getElementById('email').value;
    const code  = document.getElementById('authCode').value;
    fetch(`${AUTH_API.verifyEmail}?email=${email}&code=${code}`, { method: 'POST' })
            .then(response => {
              if (response.ok) {
                alert(AUTH_VALID_MSG.verifyOk);
                isEmailVerified = true;
                document.getElementById('email').readOnly = true;
              } else {
                alert(AUTH_VALID_MSG.verifyFail);
                isEmailVerified = false;
              }
            });
  }

  // ── 회원가입 제출 ──
  function doSignup() {
    const username       = document.getElementById('username').value.trim();
    const password       = document.getElementById('password').value;
    const passwordConfirm= document.getElementById('passwordConfirm').value;
    const email          = document.getElementById('email').value.trim();
    const name           = document.getElementById('name').value.trim();
    const birthDate      = document.getElementById('birthDate').value;
    const province       = document.querySelectorAll('.loc-big')[0].value;
    const city           = document.getElementById('city-select').value;
    const genderBtn      = document.querySelector('button[onclick*="gender"].on');
    const selectedGender = genderBtn ? genderBtn.getAttribute('data-val') : '';
    const selectedMbti   = document.getElementById('mbti-result').innerText;

    if (!username)       { alert(AUTH_VALID_MSG.idEmpty.replace('먼저 ', '')); return; }
    if (!name)           { alert(AUTH_VALID_MSG.nameEmpty); return; }
    if (!email)          { alert(AUTH_VALID_MSG.emailEmptyForm); return; }
    if (!isEmailVerified){ alert(AUTH_VALID_MSG.emailNotVerify); return; }
    if (!password)       { alert(AUTH_VALID_MSG.pwEmpty); return; }
    if (!PW_PATTERN.test(password)) { alert(PW_PATTERN_MSG); return; }
    if (password !== passwordConfirm) { alert('비밀번호 재입력이 일치하지 않습니다.'); return; }
    if (!birthDate)      { alert(AUTH_VALID_MSG.birthEmpty); return; }
    if (!province || province === '도/시 선택') { alert(AUTH_VALID_MSG.regionEmpty); return; }
    if (!selectedGender) { alert(AUTH_VALID_MSG.genderEmpty); return; }
    if (selectedMbti.length !== 4) { alert(AUTH_VALID_MSG.mbtiIncomplete); return; }

    const finalRegion = province + (city && city !== '시/군/구 선택' ? ' ' + city : '');
    const requestData = { username, password, email, name, region: finalRegion, birthDate, gender: selectedGender, mbti: selectedMbti };

    fetch(AUTH_API.signup, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(requestData),
    }).then(async response => {
      if (response.ok) {
        alert(AUTH_VALID_MSG.signupSuccess);
      } else {
        const errData = await response.json().catch(() => null);
        const msg = (errData?.errors?.[0]?.defaultMessage) || AUTH_VALID_MSG.signupFail.split(': ')[1];
        alert('가입 실패: ' + msg);
      }
    });
  }

  document.addEventListener('DOMContentLoaded', initAuthPage);
</script>

<div class="page" id="page-signup">
  <div class="auth-wrap" style="align-items:flex-start;padding-top:28px">
    <div class="auth-card" style="width:600px">
      <h2 class="auth-ttl">회원가입</h2>
      <p class="auth-sub">TripLinker와 함께 완성형 여행을 시작하세요</p>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">아이디</label>
          <div style="display:flex; gap:8px;">
            <input class="form-input" type="text" id="username" placeholder="영문·한글 20자 이내" style="flex:1;">
            <button class="btn-f" style="width:auto; padding:0 12px; font-size:12px;" onclick="checkDuplicateId()">중복 확인</button>
          </div>
          <div class="form-msg" id="uname-msg"></div>
        </div>
        <div class="form-group">
          <label class="form-label">이름</label>
          <input class="form-input" type="text" id="name" placeholder="실명">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">이메일</label>
        <div style="display:flex; gap:8px;">
          <input class="form-input" type="email" id="email" placeholder="email@example.com" style="flex:1;">
          <button class="btn-f" style="width:auto; padding:0 12px; font-size:12px;" onclick="sendAuthCode()">인증 받기</button>
        </div>
        <div class="form-msg" id="email-msg"></div>
      </div>
      <div class="form-group" id="verify-area">
        <div style="display:flex; gap:8px;">
          <input class="form-input" type="text" id="authCode" placeholder="메일로 받은 6자리 숫자" style="flex:1;">
          <button class="btn-f" style="width:auto; padding:0 12px; font-size:12px; background:gray;" onclick="verifyAuthCode()">인증 확인</button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">비밀번호</label>
        <input class="form-input" type="password" id="password" placeholder="영문+숫자+특수문자" oninput="checkPw(this)">
        <div class="pw-bar-wrap"><div class="pw-bar" id="pw-bar"></div></div>
        <div class="form-msg" id="pw-msg"></div>
      </div>
      <div class="form-group">
        <label class="form-label">비밀번호 확인</label>
        <input class="form-input" type="password" id="passwordConfirm" placeholder="재입력" oninput="checkPw2(this)">
        <div class="form-msg" id="pw2-msg"></div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">생년월일</label>
          <input class="form-input" type="date" id="birthDate">
        </div>
        <div class="form-group">
          <label class="form-label">거주 지역</label>
          <div class="loc-selector">
            <!-- 도/시: JS initAuthPage() 로 동적 주입 -->
            <select class="loc-big" onchange="updateCity(this)">
              <option value="">도/시 선택</option>
            </select>
            <select class="loc-big" id="city-select">
              <option value="">시/군/구 선택</option>
            </select>
          </div>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">성별</label>
        <!-- 성별 칩: JS initAuthPage() 로 동적 주입 -->
        <div class="chip-row"></div>
      </div>
      <div class="form-group">
        <label class="form-label">MBTI <small style="color:var(--text3);font-weight:400">(J/P → 일정 밀도 자동 설정)</small></label>
        <!-- MBTI 선택기: JS initAuthPage() 로 동적 주입 -->
        <div style="display:flex;flex-direction:column;gap:8px" id="mbti-selector"></div>
        <div style="margin-top:9px;background:var(--sage-pale);border-radius:8px;padding:8px 12px;font-size:12px;color:var(--sage-d);display:flex;align-items:center;gap:8px">
          <span style="font-weight:700">선택된 MBTI:</span>
          <span id="mbti-result" style="font-size:15px;font-weight:800">ESTP</span>
          <span id="mbti-density" style="font-size:11px;color:var(--text3)">→ P: 여유롭게 자동 설정</span>
        </div>
      </div>
      <button class="btn-f" style="width:100%;padding:12px;font-size:14px;border-radius:var(--r);margin-top:4px" onclick="doSignup()">회원가입</button>
      <div class="social-sep">
        <div class="social-line"></div><span class="social-txt">소셜 계정으로 가입</span><div class="social-line"></div>
      </div>
      <div style="display:flex;gap:9px">
        <button class="btn-social" onclick="toast('구글 OAuth 2.0')">🔵 구글로 가입</button>
        <button class="btn-social" onclick="startKakaoSignup()">🟡 카카오로 가입</button>
      </div>
      <div style="text-align:center;margin-top:14px;font-size:12px;color:var(--text3)">
        계정 있으신가요? <button class="auth-link" onclick="go('login')">로그인</button>
      </div>
    </div>
  </div>
</div>

<div class="page" id="page-signup-kakao">
  <div class="auth-wrap" style="align-items:flex-start;padding-top:28px">
    <div class="auth-card" style="width:560px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
        <div style="width:34px;height:34px;border-radius:50%;background:#FEE500;display:flex;align-items:center;justify-content:center;font-size:18px">🟡</div>
        <h2 class="auth-ttl" style="margin-bottom:0">카카오 계정으로 가입</h2>
      </div>
      <div style="background:#FFF9E6;border:1px solid #FEE500;border-radius:9px;padding:10px 14px;font-size:12px;color:#6B5A00;margin-bottom:18px">
        🟡 카카오 연결 완료 — 아이디·이메일·비밀번호는 카카오 계정으로 대체됩니다.
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">이름 <span style="color:var(--coral)">*</span></label>
          <input class="form-input" type="text" id="kakao-name" placeholder="실명 입력">
        </div>
        <div class="form-group">
          <label class="form-label">생년월일</label>
          <input class="form-input" type="date" id="kakao-birthDate">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">성별</label>
        <div class="chip-row" style="margin-top:4px">
          <button class="chip" onclick="pick(this,'kakao-gender')" data-val="M">남성</button>
          <button class="chip" onclick="pick(this,'kakao-gender')" data-val="F">여성</button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">거주 지역</label>
        <div class="loc-selector">
          <select class="loc-big" onchange="updateCity(this, 'kakao-city-select')">
            <option value="">도/시 선택</option>
          </select>
          <select class="loc-big" id="kakao-city-select">
            <option value="">시/군/구 선택</option>
          </select>
        </div>
      </div>
      <button class="btn-f" style="width:100%;padding:12px;font-size:14px;border-radius:var(--r);margin-top:4px;background:#FEE500;color:#3C1E1E" onclick="doKakaoSignup()">🟡 카카오로 가입 완료</button>
      <div style="text-align:center;margin-top:12px;font-size:12px;color:var(--text3)">
        <button class="auth-link" onclick="go('signup')">← 일반 가입으로 돌아가기</button>
      </div>
    </div>
  </div>
</div>
