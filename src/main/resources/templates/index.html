<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>TripLinker — AI 여행 플래너</title>
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800;900&family=Gmarket+Sans:wght@300;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/styles_main.css}">
  <link rel="stylesheet" th:href="@{/styles_place.css}">
</head>
<body>

<!-- ===== NAV ===== -->
<nav>
  <div class="nav-logo" onclick="go('main')">
    <img th:src="@{/img/logo.png}" alt="TripLinker" class="logo-img" />
  </div>
  <div class="nav-links">
    <button class="nav-link on" onclick="go('main');setNav(this)">🏠 홈</button>
    <button class="nav-link" onclick="go('community');setNav(this)">👥 커뮤니티</button>
    <button class="nav-link" onclick="go('weather');setNav(this)">🌤️ 날씨</button>
  </div>
  <div class="nav-btns" id="navBtns">
    <button class="btn-o" id="navLoginBtn" onclick="go('login')">로그인</button>
    <button class="btn-f" id="navSignupBtn" onclick="go('signup')">→ 회원가입</button>
    <button class="nav-icon-btn" id="navBellBtn" onclick="go('notifications')" style="display:none">🔔</button>
    <button class="btn-o" id="navUserNameBtn" onclick="go('mypage')" style="display:none">마이페이지</button>
    <button class="btn-o" id="navLogoutBtn" onclick="doLogout()" style="display:none">로그아웃</button>
    <a id="navAdminLink" onclick="go('admin')" style="display:none;cursor:pointer;color:var(--sage);font-weight:700;margin-left:8px">관리자</a>
  </div>
</nav>

<!-- ===== TOAST ===== -->
<div class="toast" id="toast"></div>

<!-- ===== PAGE FRAGMENTS ===== -->
<th:block th:insert="~{page_main :: main}"></th:block>
<th:block th:insert="~{page_auth :: auth}"></th:block>
<th:block th:insert="~{page_mypage :: mypage}"></th:block>
<th:block th:insert="~{page_planner :: planner}"></th:block>
<th:block th:insert="~{page_map :: map}"></th:block>
<th:block th:insert="~{page_budget :: budget}"></th:block>
<th:block th:insert="~{page_community :: community}"></th:block>
<th:block th:insert="~{page_admin :: admin}"></th:block>
<th:block th:insert="~{page_place :: place}"></th:block>

<!-- ===== JS ===== -->
<script th:src="@{/app_main.js}"></script>
<script th:src="@{/app_community.js}"></script>
</body>
</html>
