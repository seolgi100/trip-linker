  /* ============================================================
   * [3구역 - 동적 렌더링 및 고정 데이터 주입 엔진]
   * ------------------------------------------------------------
   * 하단의 텅 빈 HTML 뼈대에 상단 2구역의 옵션 및 텍스트를 자동 매핑하고
   * 1구역(혹은 추후 Ajax 데이터)의 실시간 목록을 그려주는 자바스크립트 엔진입니다.
   * ============================================================ */
  function initAdminPage() {
    // 1. 고정 텍스트 및 라벨 일괄 타이틀 주입
    document.querySelector('#ad-dashboard h2').textContent = ADMIN_UI_TEXTS.titles.dashboard;
    document.querySelector('#ad-users h2').textContent = ADMIN_UI_TEXTS.titles.users;
    document.querySelector('#ad-reports h2').textContent = ADMIN_UI_TEXTS.titles.reports;
    document.querySelector('#ad-curation h2').textContent = ADMIN_UI_TEXTS.titles.curation;

    document.querySelector('#ad-users table thead tr').innerHTML = ADMIN_UI_TEXTS.tables.usersHead.map(h => `<th>${h}</th>`).join('');
    document.querySelector('#ad-reports table thead tr').innerHTML = ADMIN_UI_TEXTS.tables.reportsHead.map(h => `<th>${h}</th>`).join('');
    document.querySelector('#ad-curation table thead tr').innerHTML = ADMIN_UI_TEXTS.tables.curationHead.map(h => `<th>${h}</th>`).join('');

    document.querySelector('#ad-curation .bcard-ttl').textContent = ADMIN_UI_TEXTS.curationForm.cardTitle;

    const mainLabels = document.querySelectorAll('#ad-curation .bcard > .form-row .form-label');
    mainLabels[0].textContent = ADMIN_UI_TEXTS.curationForm.labels[0];
    mainLabels[1].textContent = ADMIN_UI_TEXTS.curationForm.labels[1];
    mainLabels[2].textContent = ADMIN_UI_TEXTS.curationForm.labels[2];
    mainLabels[3].textContent = ADMIN_UI_TEXTS.curationForm.labels[3];

    const mainInputs = document.querySelectorAll('#ad-curation .bcard > .form-row .form-input');
    mainInputs[0].placeholder = ADMIN_UI_TEXTS.curationForm.placeholders.theme;
    mainInputs[1].placeholder = ADMIN_UI_TEXTS.curationForm.placeholders.tags;

    document.querySelector('#ad-curation .plan-builder-ttl').innerHTML =
            `${ADMIN_UI_TEXTS.curationForm.builderTitle}<small style="font-size:11px;color:var(--text3);font-weight:400">${ADMIN_UI_TEXTS.curationForm.builderSubTitle}</small>`;

    // 2. 기존 nth-of-type 호환성 보존용 섹션 블록 타이틀 주입
    const builderBlocks = document.querySelectorAll('.plan-builder > div[style*="background:var(--surface)"]');

    builderBlocks[0].querySelector('div:first-child').textContent = ADMIN_UI_TEXTS.curationForm.sectionTitles[0];
    const block1Labels = builderBlocks[0].querySelectorAll('.form-label');
    block1Labels[0].textContent = ADMIN_UI_TEXTS.curationForm.labels[4];
    block1Labels[1].textContent = ADMIN_UI_TEXTS.curationForm.labels[5];
    block1Labels[2].textContent = ADMIN_UI_TEXTS.curationForm.labels[6];
    block1Labels[3].textContent = ADMIN_UI_TEXTS.curationForm.labels[7];
    block1Labels[4].textContent = ADMIN_UI_TEXTS.curationForm.labels[8];
    block1Labels[5].textContent = ADMIN_UI_TEXTS.curationForm.labels[9];
    builderBlocks[0].querySelector('input[type="number"]:not([value])').placeholder = ADMIN_UI_TEXTS.curationForm.placeholders.budget;

    builderBlocks[1].querySelector('div:first-child').textContent = ADMIN_UI_TEXTS.curationForm.sectionTitles[1];
    document.getElementById('cadm-trans').placeholder = ADMIN_UI_TEXTS.curationForm.inputPlaceholders.trans;

    builderBlocks[2].querySelector('div:first-child').textContent = ADMIN_UI_TEXTS.curationForm.sectionTitles[2];
    document.getElementById('cadm-acc').placeholder = ADMIN_UI_TEXTS.curationForm.inputPlaceholders.acc;

    builderBlocks[3].querySelector('div:first-child').textContent = ADMIN_UI_TEXTS.curationForm.sectionTitles[3];
    document.getElementById('cadm-comp').placeholder = ADMIN_UI_TEXTS.curationForm.inputPlaceholders.comp;

    builderBlocks[4].querySelector('div:first-child').textContent = ADMIN_UI_TEXTS.curationForm.sectionTitles[4];
    document.getElementById('cadm-style').placeholder = ADMIN_UI_TEXTS.curationForm.inputPlaceholders.style;

    builderBlocks[5].querySelector('div:first-child').textContent = ADMIN_UI_TEXTS.curationForm.sectionTitles[5];
    document.getElementById('cadm-food').placeholder = ADMIN_UI_TEXTS.curationForm.inputPlaceholders.food;

    builderBlocks[6].querySelector('div:first-child').textContent = ADMIN_UI_TEXTS.curationForm.sectionTitles[6];
    document.getElementById('cadm-special').placeholder = ADMIN_UI_TEXTS.curationForm.inputPlaceholders.special;

    builderBlocks[7].querySelector('div:first-child').innerHTML =
            `${ADMIN_UI_TEXTS.curationForm.sectionTitles[7]}<small style="font-size:10px;color:var(--text3);font-weight:400">${ADMIN_UI_TEXTS.curationForm.sectionSubs.density}</small>`;

    builderBlocks[8].querySelector('div:first-child').textContent = ADMIN_UI_TEXTS.curationForm.sectionTitles[8];
    document.getElementById('cadm-accopts').placeholder = ADMIN_UI_TEXTS.curationForm.inputPlaceholders.accopts;

    document.querySelector('#ad-curation .btn-add-day').textContent = ADMIN_UI_TEXTS.curationForm.btnAddDay;
    document.querySelector('#ad-curation .btn-next').textContent = ADMIN_UI_TEXTS.curationForm.btnSubmit;

    // 3. 고정 UI 설정 리스트 기반으로 사이드 네비게이션 생성
    const navEl = document.querySelector('.admin-nav');
    if (navEl) {
      const logoEl = navEl.querySelector('.admin-logo');
      navEl.innerHTML = (logoEl ? logoEl.outerHTML : '<div class="admin-logo">⚙️ Admin</div>') +
              ADMIN_MENUS.map(m => `<button class="admin-link${m.default?' on':''}" onclick="showAdmin('${m.sec}',this)">${m.icon} ${m.label}</button>`).join('') +
              `<div style="margin-top:auto;border-top:1px solid rgba(255,255,255,.1);padding-top:10px"><button class="admin-link" onclick="go('main')">← 메인으로</button></div>`;
    }

    // 4. 셀렉트 박스 고정 옵션 아이템 목록 주입
    const cadmDepSel  = document.querySelector('select[onchange*="cadm-dep-city"]');
    const cadmDestSel = document.getElementById('cadm-dest-prov');
    if (cadmDepSel) cadmDepSel.innerHTML = `<option value="">도/시 선택</option>` + ADMIN_DEP_PROVINCES.map(p => `<option>${p}</option>`).join('');
    if (cadmDestSel) cadmDestSel.innerHTML = `<option value="">도/시 선택</option>` + ADMIN_DEST_PROVINCES.map(p => `<option>${p}</option>`).join('');

    // 5. ★ [핵심] 고정 옵션 데이터를 바탕으로 하단 빈 영역에 선택용 칩 버튼들을 자동 생성
    _renderAdminChips('#ad-curation .chip-row:nth-of-type(1)', ADMIN_TRANSPORT_OPTS.map(o=>({label:o.label,default:o.default})), 'c-trans', false);
    _renderAdminChips('#ad-curation .chip-row:nth-of-type(2)', ADMIN_ACC_OPTS.map((l,i)=>({label:l,default:i===0})), 'c-acc', false);
    _renderAdminChips('#ad-curation .chip-row:nth-of-type(3)', ADMIN_COMP_OPTS, 'c-comp', false);
    _renderAdminChips('#ad-curation .chip-row:nth-of-type(4)', ADMIN_STYLE_OPTS.map((l,i)=>({label:l,default:i===0})), null, true);
    _renderAdminChips('#ad-curation .chip-row:nth-of-type(5)', ADMIN_DIET_OPTS, null, true);
    _renderAdminChips('#ad-curation .chip-row:nth-of-type(6)', ADMIN_SPECIAL_OPTS.map(l=>({label:l,default:false})), null, true);
    _renderAdminChips('#ad-curation .chip-row:nth-of-type(7)', ADMIN_DENSITY_OPTS, 'c-density', false);
    _renderAdminChips('#ad-curation .chip-row:nth-of-type(8)', ADMIN_ACCOPTS.map(l=>({label:l,default:false})), null, true);

    const densityNoteEl = document.querySelector('#ad-curation .chip-row:nth-of-type(7) + div');
    if (densityNoteEl) densityNoteEl.textContent = ADMIN_DENSITY_MBTI_NOTE;

    // 6. 실시간 가짜 데이터 화면 출력 (백엔드 오픈 시 이 하단 부분만 fetch API로 대체됨)
    renderDynamicMockData();
  }

  // 실시간 가변 데이터만 그리는 서브 함수
  function renderDynamicMockData() {
    const statsEl = document.querySelector('.stats-grid');
    if (statsEl && typeof ADMIN_STATS !== 'undefined') {
      statsEl.innerHTML = ADMIN_STATS.map(s => `
      <div class="stat-card"${s.alert ? ' style="border-color:var(--coral)"' : ''}>
        <div class="sc-label">${s.label}</div>
        <div class="sc-num"${s.alert ? ' style="color:var(--coral)"' : ''}>${s.num}</div>
        <div class="sc-sub"${s.alert ? ' style="color:var(--coral)"' : ''}>${s.sub}</div>
      </div>`).join('');
    }

    const userTbody = document.querySelector('#ad-users table tbody');
    if (userTbody && typeof ADMIN_USERS !== 'undefined') {
      userTbody.innerHTML = ADMIN_USERS.map(u => `
      <tr>
        <td>${u.id}</td><td>${u.username}</td><td>${u.email}</td><td>${u.joinDate}</td>
        <td><span class="badge ${u.statusCls}">${u.status}</span></td>
        <td>${u.canSuspend
              ? `<button class="btn-o" style="padding:3px 9px;font-size:11px;color:var(--coral);border-color:var(--coral)" onclick="openSuspendModal('${u.username}','${u.id}')">정지</button>`
              : `<span style="font-size:11px;color:var(--text3)">파기 완료</span>`
      }</td>
      </tr>`).join('');
    }

    const reportTbody = document.querySelector('#ad-reports table tbody');
    if (reportTbody && typeof ADMIN_REPORTS !== 'undefined') {
      reportTbody.innerHTML = ADMIN_REPORTS.map(r => `
      <tr>
        <td>${r.id}</td><td>${r.post}</td><td>${r.reporter}</td><td>${r.reason}</td>
        <td><span class="badge" style="background:#FEF3F2;color:var(--coral)">${r.status}</span></td>
        <td>
          <button class="btn-o" style="padding:3px 8px;font-size:11px;color:var(--coral);border-color:var(--coral)" onclick="openReportAction('delete','${r.id}','${r.post}','${r.reporter}','${r.reason}')">삭제</button>&nbsp;
          <button class="btn-o" style="padding:3px 8px;font-size:11px" onclick="openReportAction('reject','${r.id}','${r.post}','${r.reporter}','${r.reason}')">반려</button>
        </td>
      </tr>`).join('');
    }

    const curTbody = document.querySelector('#ad-curation table tbody');
    if (curTbody && typeof ADMIN_CURATIONS !== 'undefined') {
      curTbody.innerHTML = ADMIN_CURATIONS.map(c => `
      <tr>
        <td>${c.title}</td><td>${c.tags}</td><td>${c.period}</td><td>${c.order}</td>
        <td>
          <button class="btn-o" style="padding:3px 8px;font-size:11px">수정</button>&nbsp;
          <button class="btn-o" style="padding:3px 8px;font-size:11px;color:var(--coral);border-color:var(--coral)" onclick="if(confirm('삭제?'))toast('삭제 완료')">삭제</button>
        </td>
      </tr>`).join('');
    }

    const curDaysEl = document.getElementById('curDays');
    if (curDaysEl && typeof ADMIN_CUR_DAYS_SAMPLE !== 'undefined' && typeof ADMIN_PLACE_TYPES !== 'undefined') {
      const typeOpts = ADMIN_PLACE_TYPES.map(t => `<option>${t}</option>`).join('');
      curDaysEl.innerHTML = ADMIN_CUR_DAYS_SAMPLE.map(day => `
      <div class="plan-day-block" style="border:1px solid var(--sage-l)">
        <div class="pdb-hd" style="border-bottom:1px solid var(--border2);padding-bottom:8px;margin-bottom:8px">
          <span style="font-weight:800;color:var(--sage-d)">${day.label}</span>
          <div style="display:flex;gap:6px">
            <button style="font-size:11px;background:var(--sage-pale);border:1px solid var(--sage-l);border-radius:5px;padding:3px 9px;cursor:pointer;color:var(--sage-d)" onclick="addPlanItem(this)">+ 장소 추가</button>
            <button style="font-size:11px;background:#FEF3F2;border:1px solid #FECACA;border-radius:5px;padding:3px 7px;cursor:pointer;color:var(--coral)" onclick="removeDay(this)">✕</button>
          </div>
        </div>
        ${day.places.map(p => `
        <div class="pdb-item" style="flex-direction:column;align-items:flex-start;gap:8px">
          <div style="display:flex;align-items:center;gap:8px;width:100%">
            <span class="pdb-type-icon">${p.typeIcon}</span>
            <input style="flex:1;border:1px solid var(--border2);background:var(--surface);padding:5px 9px;border-radius:6px;font-size:12px;font-family:inherit;outline:none" value="${p.name}" placeholder="장소명">
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;width:100%">
            <select style="padding:5px 7px;border-radius:6px;border:1px solid var(--border2);font-size:11px;font-family:inherit">${typeOpts}</select>
            <input type="time" value="${p.time}" style="padding:5px 7px;border-radius:6px;border:1px solid var(--border2);font-size:11px;font-family:inherit">
            <input type="number" placeholder="금액(원)" value="${p.amount}" style="padding:5px 7px;border-radius:6px;border:1px solid var(--border2);font-size:11px;font-family:inherit">
          </div>
        </div>`).join('')}
      </div>`).join('');
    }
  }

  function _renderAdminChips(selector, options, pickGroup, isToggle) {
    const row = document.querySelector(selector);
    if (!row) return;
    row.innerHTML = options.map((opt, i) => {
      const isOther = opt.label === '기타';
      const otherId = isOther && pickGroup ? `cadm-${pickGroup.replace('c-','')}` : null;
      const otherHandler = otherId ? `;showOtherInput('${otherId}',this)` : '';
      const handler = isToggle ? `tog(this)${otherHandler}` : `pick(this,'${pickGroup}')${otherHandler}`;
      return `<button class="chip chip-sm${opt.default?' on':''}" onclick="${handler}">${opt.label}</button>`;
    }).join('');
  }

  document.addEventListener('DOMContentLoaded', initAdminPage);
</script>
